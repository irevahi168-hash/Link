<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Content Locker</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .timer-text {
            font-size: 18px;
            margin-bottom: 20px;
        }
        #seconds {
            font-size: 32px;
            color: #ff4757;
            font-weight: bold;
        }
        .unlock-btn {
            display: none;
            background-color: #2ed573;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        .unlock-btn:hover {
            background-color: #2ecc71;
            transform: scale(1.05);
        }
        #video-player {
            display: none;
            margin-top: 20px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="status-area">
        <h2 id="headline">Content is Locked</h2>
        <p class="timer-text" id="timer-msg">Please wait <span id="seconds">5</span> seconds to unlock...</p>
        <button class="unlock-btn" id="unlockBtn" onclick="unlockContent()">UNLOCK VIDEO</button>
    </div>

    <div id="video-player">
        <h3>Enjoy your video!</h3>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    var timeLeft = 5;
    var directLink = "https://www.profitablecpmratenetwork.com/pxxitct8?key=182b87399fece263402d25e50f40cb82"; // এখানে আপনার অ্যাড লিঙ্ক দিন

    var countdown = setInterval(function() {
        timeLeft--;
        document.getElementById("seconds").textContent = timeLeft;
        
        if (timeLeft <= 0) {
            clearInterval(countdown);
            document.getElementById("timer-msg").style.display = "none";
            document.getElementById("unlockBtn").style.display = "inline-block";
            document.getElementById("headline").textContent = "Ready to Unlock";
        }
    }, 1000);

    function unlockContent() {
        // নতুন ট্যাবে অ্যাড লিঙ্ক ওপেন হবে
        window.open(directLink, '_blank');
        
        // একই সাথে নিচের ভিডিওটি শো করবে
        document.getElementById("status-area").style.display = "none";
        document.getElementById("video-player").style.display = "block";
    }
</script>

</body>
</html>
