<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050b17; color: #e2e8f0; }
        .player-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 16px; overflow: hidden; 
            border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        #thumbBg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(15px) brightness(0.3);
            transform: scale(1.1);
        }
        .timer-loader {
            position: relative; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #ef4444; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans">

    <header class="bg-slate-950/80 border-b border-slate-800 p-4 sticky top-0 z-50 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-red-500 font-bold flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                BACK
            </a>
            <div class="text-xl font-black italic tracking-tighter uppercase text-white">VIDEO<span class="text-red-600">HUB</span></div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            
            <div id="playerBox" class="player-wrapper">
                <img id="thumbBg" src="" alt="Background">
                
                <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-50">
                    <div id="preClick" class="block">
                        <div class="mb-6 p-4 bg-red-600/20 rounded-full inline-block">
                            <svg class="w-10 h-10 text-red-600" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2 uppercase">Video is Locked</h3>
                        <p class="text-slate-400 text-sm mb-8">Click the button below to unlock and watch.</p>
                        <button onclick="startUnlockProcess()" class="bg-red-600 hover:bg-red-700 text-white px-10 py-4 rounded-full font-black shadow-2xl transition-all active:scale-95 uppercase tracking-widest">
                            Unlock Video
                        </button>
                    </div>

                    <div id="postClick" class="hidden">
                        <div class="relative mb-6">
                            <div class="timer-loader mx-auto"></div>
                            <div id="countdown" class="absolute inset-0 flex items-center justify-center text-3xl font-black text-white">10</div>
                        </div>
                        <h3 class="text-lg font-bold text-white mb-2 uppercase">Processing...</h3>
                        <p class="text-slate-400 text-xs">Please wait 10 seconds. You will be redirected automatically.</p>
                    </div>
                </div>
            </div>
            
            <div class="mt-8">
                <h1 id="vTitle" class="text-xl md:text-3xl font-black text-white uppercase leading-tight">Loading Title...</h1>
                <div class="mt-4 flex gap-4 text-slate-500 text-[10px] font-mono border-b border-slate-800 pb-8">
                    <span id="vID" class="text-red-600 font-bold">UID: --</span>
                    <span id="vDur">DURATION: --</span>
                </div>
            </div>

            <div class="mt-12">
                <h3 class="text-lg font-black mb-6 flex items-center gap-3 uppercase">
                    <span class="w-1.5 h-6 bg-red-600 rounded-full"></span>
                    Suggested For You
                </h3>
                <div id="rec-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6"></div>
            </div>
        </div>
    </main>

    <script>
        const AD_LINK = "https://your-ad-link.com"; // Replace with your Ad link
        let targetVideoUrl = "";

        async function initPage() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            try {
                const response = await fetch('video_data.json');
                const data = await response.json();
                const v = data.find(item => item.id == id);

                if (v) {
                    document.getElementById('vTitle').innerText = v.title;
                    document.getElementById('vID').innerText = "UID: " + v.id;
                    document.getElementById('vDur').innerText = "DUR: " + (v.duration || 'N/A');
                    document.getElementById('thumbBg').src = v.thumb;
                    
                    // Set final redirect URL
                    targetVideoUrl = `https://www.xmishti.com/embed/${v.id}/`;

                    renderRecs(data, id);
                }
            } catch (err) { console.error(err); }
        }

        function startUnlockProcess() {
            // 1. Open Ad in new tab
            window.open(AD_LINK, '_blank');

            // 2. Hide pre-click UI and show Timer UI
            document.getElementById('preClick').classList.add('hidden');
            document.getElementById('postClick').classList.remove('hidden');

            // 3. Start 10s Countdown
            let timeLeft = 10;
            const display = document.getElementById('countdown');

            const timer = setInterval(() => {
                timeLeft--;
                display.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    // 4. Final Direct Redirect
                    window.location.href = targetVideoUrl;
                }
            }, 1000);
        }

        function renderRecs(data, current) {
            const grid = document.getElementById('rec-grid');
            data.filter(v => v.id != current).sort(() => 0.5 - Math.random()).slice(0, 12).forEach(v => {
                grid.innerHTML += `
                    <div class="cursor-pointer group" onclick="window.location.href='video.html?id=${v.id}'">
                        <div class="aspect-video bg-slate-900 rounded-xl overflow-hidden mb-3 ring-1 ring-slate-800 group-hover:ring-red-600 transition-all">
                            <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500">
                        </div>
                        <h4 class="text-[10px] font-bold line-clamp-2 text-slate-400 uppercase">${v.title}</h4>
                    </div>`;
            });
        }

        window.onload = initPage;
    </script>
</body>
</html>
