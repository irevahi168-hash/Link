<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Watch Video - Video Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="bg-gray-800 p-4 shadow-lg">
        <div class="container mx-auto">
            <a href="index.html" class="text-red-500 font-bold flex items-center gap-2">
                <span>←</span> Back to Gallery
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div class="max-w-5xl mx-auto">
            
            <div id="playerBox" class="bg-black aspect-video rounded-xl overflow-hidden shadow-2xl ring-1 ring-gray-700 relative">
                <div id="loading" class="w-full h-full flex items-center justify-center text-gray-500 animate-pulse">
                    প্রক্সি সার্ভারের মাধ্যমে ভিডিও লোড হচ্ছে...
                </div>
            </div>
            
            <h1 id="vTitle" class="mt-5 text-lg md:text-2xl font-bold leading-tight">Loading Title...</h1>
            <div class="mt-3 flex gap-4 text-gray-400 text-xs border-b border-gray-800 pb-5">
                <span id="vID" class="text-red-400">ID: --</span>
                <span id="vDur">Duration: --</span>
            </div>

            <h2 class="text-lg font-bold mt-10 mb-6 border-l-4 border-red-500 pl-3">Recommended For You</h2>
            <div id="rec-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <script>
        async function loadVideo() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            try {
                const response = await fetch('video_data.json');
                const allVideos = await response.json();
                const video = allVideos.find(v => v.id == id);

                if(video) {
                    document.title = video.title;
                    document.getElementById('vTitle').innerText = video.title;
                    document.getElementById('vID').innerText = "VIDEO ID: " + video.id;
                    document.getElementById('vDur').innerText = "Duration: " + (video.duration || 'N/A');
                    
                    // সরাসরি MP4 বা Embed লিঙ্কটি এখানে দিন
                    // আমরা এখানে Google Proxy ব্যবহার করে Header বাইপাস করার চেষ্টা করছি
                    const targetUrl = `https://www.xmishti.com/embed/${video.id}/`;
                    
                    // Method: Google Gadget Proxy (এটি হেডার ক্লিন করে দেয়)
                    const proxyUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(targetUrl)}`;

                    document.getElementById('playerBox').innerHTML = `
                        <iframe 
                            src="${proxyUrl}" 
                            style="width:100%; height:100%; border:none;" 
                            allowfullscreen 
                            loading="lazy">
                        </iframe>`;
                    
                    // রিকমেন্ডেশন গ্রিড
                    const recs = allVideos.sort(() => 0.5 - Math.random()).slice(0, 8);
                    const recGrid = document.getElementById('rec-grid');
                    recs.forEach(v => {
                        recGrid.innerHTML += `
                            <div class="cursor-pointer group" onclick="window.location.href='video.html?id=${v.id}'">
                                <div class="aspect-video rounded-lg overflow-hidden bg-gray-800 mb-2 ring-1 ring-gray-700">
                                    <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-105 transition-all">
                                </div>
                                <h4 class="text-[11px] md:text-[13px] font-medium line-clamp-2">${v.title}</h4>
                            </div>`;
                    });

                }
            } catch (e) {
                console.error(e);
            }
        }
        loadVideo();
    </script>
</body>
</html>
