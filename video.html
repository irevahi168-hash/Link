<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - Instant Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050b17; color: #e2e8f0; }
        .player-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 20px; overflow: hidden; 
            border: 1px solid #1e293b; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        #thumbBg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(20px) brightness(0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body class="font-sans">

    <header class="bg-slate-950/90 border-b border-slate-800 p-4 sticky top-0 z-50 backdrop-blur-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-red-600 font-bold flex items-center gap-2 uppercase">BACK</a>
            <div class="text-xl font-black italic tracking-tighter uppercase text-white">VIDEO<span class="text-red-600">HUB</span></div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <div id="playerBox" class="player-wrapper">
                <img id="thumbBg" src="" alt="Thumbnail">
                <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-50">
                    <h3 class="text-2xl font-black text-white mb-2 uppercase">Video Ready</h3>
                    <p class="text-slate-400 text-sm mb-8">Click to watch securely in a new tab.</p>
                    <button id="mainBtn" onclick="bypassAndOpen()" class="bg-red-600 hover:bg-red-700 text-white px-12 py-4 rounded-full font-black shadow-2xl transition-all active:scale-95 uppercase text-sm">
                        Watch Now
                    </button>
                </div>
            </div>
            
            <div class="mt-8">
                <h1 id="vTitle" class="text-xl md:text-3xl font-black text-white uppercase tracking-tighter leading-tight text-left">Loading...</h1>
            </div>

            <div id="rec-grid" class="mt-12 grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6"></div>
        </div>
    </main>

    <script>
        const AD_URL = "https://www.profitablecpmratenetwork.com/pxxitct8?key=182b87399fece263402d25e50f40cb82"; 
        let videoEmbedUrl = "";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            try {
                const response = await fetch('video_data.json');
                const videos = await response.json();
                const video = videos.find(v => v.id == id);

                if (video) {
                    document.getElementById('vTitle').innerText = video.title;
                    document.getElementById('thumbBg').src = video.thumb;
                    videoEmbedUrl = `https://www.xmishti.com/embed/${video.id}/`;
                    renderRecs(videos, id);
                }
            } catch (e) { console.error(e); }
        }

        function bypassAndOpen() {
            // ১. একটি অদৃশ্য আইফ্রেম তৈরি করে রেফারার হাইড করা
            const bypassHtml = `
                <html>
                <head><meta name="referrer" content="no-referrer"><meta http-equiv="refresh" content="0;url=${videoEmbedUrl}"></head>
                <body></body>
                </html>
            `;
            
            const blob = new Blob([bypassHtml], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            
            // ২. নিউ ট্যাবে ব্লব ইউআরএল ওপেন করা (যাতে xmishti রেফারার দেখতে না পায়)
            window.open(blobUrl, '_blank');

            // ৩. একই সাথে বর্তমান ট্যাবকে আপনার অ্যাড লিঙ্কে নিয়ে যাওয়া
            setTimeout(() => {
                window.location.href = AD_URL;
            }, 500);
        }

        function renderRecs(data, current) {
            const grid = document.getElementById('rec-grid');
            data.filter(v => v.id != current).sort(() => 0.5 - Math.random()).slice(0, 12).forEach(v => {
                grid.innerHTML += `
                    <div class="cursor-pointer group" onclick="window.location.href='video.html?id=${v.id}'">
                        <div class="aspect-video bg-slate-900 rounded-xl overflow-hidden mb-3 ring-1 ring-slate-800 group-hover:ring-red-600 transition-all">
                            <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500">
                        </div>
                        <h4 class="text-[10px] font-bold line-clamp-2 text-slate-500 group-hover:text-white uppercase tracking-tight transition-colors">${v.title}</h4>
                    </div>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
