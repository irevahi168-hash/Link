<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Video - Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; }
        .player-box { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 24px; overflow: hidden; 
            border: 1px solid #1e293b; 
        }
        #blurBg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(30px) brightness(0.2);
            transform: scale(1.2);
        }
    </style>
</head>
<body class="font-sans">

    <header class="p-5 flex justify-between items-center border-b border-slate-900">
        <a href="index.html" class="bg-slate-900 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all uppercase tracking-widest">Back to Library</a>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-5xl">
        <div class="player-box shadow-2xl">
            <img id="blurBg" src="" alt="Background">
            
            <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-10">
                <div class="w-20 h-20 bg-red-600/20 rounded-full flex items-center justify-center mb-6 animate-pulse border border-red-600/30">
                    <svg class="w-10 h-10 text-red-600" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
                </div>
                <h2 class="text-2xl md:text-3xl font-black text-white uppercase tracking-tighter mb-2">Ready to Stream?</h2>
                <p class="text-slate-400 text-sm mb-8">High-speed server connected. Click below to watch.</p>
                
                <button onclick="unlockAndPlay()" class="bg-red-600 hover:bg-red-700 text-white px-14 py-4 rounded-full font-black text-xs uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                    Unlock Now
                </button>
            </div>
        </div>

        <div class="mt-8">
            <h1 id="vTitle" class="text-2xl md:text-4xl font-black text-white uppercase leading-none tracking-tighter">Loading...</h1>
            <div class="flex gap-4 mt-4">
                <span class="bg-slate-900 border border-slate-800 px-3 py-1 rounded text-[10px] font-bold text-red-500 uppercase">Ultra HD</span>
                <span id="vID" class="text-slate-500 text-[10px] uppercase font-mono mt-1">UID: --</span>
            </div>
        </div>

        <div class="mt-16">
            <h3 class="text-lg font-black uppercase tracking-tighter mb-6 border-l-4 border-red-600 pl-3">Suggested Movies</h3>
            <div id="recGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </div>
    </main>

    <script>
        const AD_URL = "https://www.profitablecpmratenetwork.com/pxxitct8?key=182b87399fece263402d25e50f40cb82";
        let directSource = "";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            try {
                const response = await fetch('video_data.json');
                const data = await response.json();
                const video = data.find(v => v.id == id);

                if (video) {
                    document.getElementById('vTitle').innerText = video.title;
                    document.getElementById('vID').innerText = "UID: " + video.id;
                    document.getElementById('blurBg').src = video.thumb;
                    directSource = video.direct_url;
                    
                    renderRecs(data, id);
                }
            } catch (err) { console.error(err); }
        }

        function unlockAndPlay() {
            // ১. নিউ ট্যাবে ভিডিও প্লে হবে (আপনার ডাইরেক্ট সোর্স ব্যবহার করে)
            const playerHtml = `
                <html>
                <head><title>Playing...</title><style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;}video{width:100%;height:100%;}</style></head>
                <body><video controls autoplay><source src="${directSource}" type="video/mp4"></video></body>
                </html>
            `;
            const blob = new Blob([playerHtml], { type: 'text/html' });
            window.open(URL.createObjectURL(blob), '_blank');

            // ২. বর্তমান ট্যাব অ্যাডে চলে যাবে
            window.location.href = AD_URL;
        }

        function renderRecs(data, current) {
            const grid = document.getElementById('recGrid');
            const others = data.filter(v => v.id != current).sort(() => 0.5 - Math.random()).slice(0, 8);
            grid.innerHTML = others.map(v => `
                <div class="cursor-pointer group" onclick="window.location.href='video.html?id=${v.id}'">
                    <div class="aspect-video bg-slate-900 rounded-xl overflow-hidden mb-2 ring-1 ring-slate-800 group-hover:ring-red-600 transition-all">
                        <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-all">
                    </div>
                    <h4 class="text-[10px] font-bold uppercase text-slate-500 group-hover:text-white line-clamp-1">${v.title}</h4>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
