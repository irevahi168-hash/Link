<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - Unlock Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050b17; color: #e2e8f0; }
        .player-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border-radius: 12px; overflow: hidden; 
            border: 1px solid #1e293b;
        }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .unlock-overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50;
        }
    </style>
</head>
<body class="font-sans">

    <header class="bg-slate-950/50 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-red-500 font-bold flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back
            </a>
            <div class="text-xl font-black italic">VIDEO<span class="text-red-600">HUB</span></div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            
            <div id="playerBox" class="player-wrapper">
                <div id="unlockOverlay" class="unlock-overlay p-6 text-center">
                    <div class="mb-4 p-3 bg-red-600/10 rounded-full">
                        <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-2">ভিডিওটি লক করা আছে</h3>
                    <p class="text-slate-400 text-sm mb-6">নিচের বাটনে ক্লিক করে ১০ সেকেন্ড অপেক্ষা করুন ভিডিওটি দেখার জন্য।</p>
                    
                    <button id="adBtn" onclick="handleAdClick()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold shadow-lg transition-all active:scale-95">
                        OPEN AD TO UNLOCK
                    </button>

                    <button id="playBtn" style="display: none;" class="bg-green-600 hover:bg-green-700 text-white px-10 py-3 rounded-full font-bold shadow-lg animate-bounce">
                        WATCH VIDEO NOW
                    </button>
                    
                    <p id="timerText" class="mt-4 text-xs text-slate-500 hidden italic"></p>
                </div>

                <div id="videoContainer" class="hidden h-full w-full"></div>
            </div>
            
            <div class="mt-6">
                <h1 id="vTitle" class="text-xl md:text-2xl font-bold text-white uppercase">Loading Video...</h1>
                <div class="mt-2 flex gap-4 text-slate-500 text-xs font-mono">
                    <span id="vID">ID: --</span>
                    <span id="vDur">--</span>
                </div>
            </div>

            <div class="mt-12">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-red-600 rounded-full"></span>
                    Suggested Videos
                </h3>
                <div id="rec-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        // --- কনফিগারেশন ---
        const MY_AD_LINK = "https://your-ad-network-link.com"; // আপনার অ্যাডের লিঙ্ক এখানে দিন
        let videoEmbedUrl = "";

        async function initPage() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            try {
                const res = await fetch('video_data.json');
                const data = await res.json();
                const v = data.find(item => item.id == id);

                if (v) {
                    document.title = v.title;
                    document.getElementById('vTitle').innerText = v.title;
                    document.getElementById('vID').innerText = "ID: " + v.id;
                    document.getElementById('vDur').innerText = v.duration || "N/A";
                    
                    // ভিডিওর আসল লিঙ্ক সেট করে রাখা
                    videoEmbedUrl = `https://www.xmishti.com/embed/${v.id}/`;

                    // রিকমেন্ডেশন লোড
                    renderRecs(data, id);
                }
            } catch (err) { console.error(err); }
        }

        function handleAdClick() {
            // ১. নতুন ট্যাবে অ্যাড ওপেন করা
            window.open(MY_AD_LINK, '_blank');

            // ২. টাইমার এবং বাটন লজিক
            const adBtn = document.getElementById('adBtn');
            const timerText = document.getElementById('timerText');
            const playBtn = document.getElementById('playBtn');

            adBtn.style.display = 'none';
            timerText.classList.remove('hidden');
            
            let timeLeft = 10; // ১০ সেকেন্ড অপেক্ষা
            timerText.innerText = `অপেক্ষা করুন: ${timeLeft}s`;

            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = `অপেক্ষা করুন: ${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerText.classList.add('hidden');
                    playBtn.style.display = 'block';
                }
            }, 1000);

            // ৩. প্লে বাটনে ক্লিক করলে ভিডিও দেখাবে
            playBtn.onclick = () => {
                document.getElementById('unlockOverlay').classList.add('hidden');
                document.getElementById('videoContainer').classList.remove('hidden');
                document.getElementById('videoContainer').innerHTML = `
                    <iframe src="${videoEmbedUrl}" allowfullscreen referrerpolicy="no-referrer"></iframe>
                `;
            };
        }

        function renderRecs(data, currentId) {
            const grid = document.getElementById('rec-grid');
            data.filter(v => v.id != currentId).sort(() => 0.5 - Math.random()).slice(0, 8).forEach(v => {
                grid.innerHTML += `
                    <div class="cursor-pointer group" onclick="window.location.href='video.html?id=${v.id}'">
                        <div class="aspect-video bg-slate-900 rounded-lg overflow-hidden mb-2 ring-1 ring-slate-800 group-hover:ring-red-600 transition-all">
                            <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500">
                        </div>
                        <h4 class="text-[11px] font-medium line-clamp-2 text-slate-400 group-hover:text-white">${v.title}</h4>
                    </div>`;
            });
        }

        window.onload = initPage;
    </script>
</body>
</html>
