<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Video Hub - Premium Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050b17; color: #e2e8f0; }
        .player-wrapper { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #1e293b;
        }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="font-sans">

    <header class="bg-slate-950/50 backdrop-blur-md border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-red-500 font-bold hover:scale-105 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back
            </a>
            <div class="text-xl font-black tracking-tighter uppercase text-white">Video<span class="text-red-600">Hub</span></div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            
            <div id="playerBox" class="player-wrapper">
                <div class="flex flex-col items-center justify-center h-full space-y-4">
                    <div class="w-10 h-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-slate-500 text-sm italic">Establishing secure connection...</p>
                </div>
            </div>
            
            <div class="mt-6">
                <h1 id="vTitle" class="text-xl md:text-3xl font-bold text-white line-clamp-2 leading-tight uppercase">Loading...</h1>
                <div class="mt-4 flex flex-wrap gap-3 items-center text-[10px] md:text-xs">
                    <span id="vID" class="bg-slate-800 text-red-500 border border-slate-700 px-3 py-1 rounded-md font-mono font-bold">ID: --</span>
                    <span id="vDur" class="bg-slate-800 text-slate-400 border border-slate-700 px-3 py-1 rounded-md">--</span>
                    <span class="ml-auto flex items-center gap-1 text-green-500 font-bold">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> FULL HD
                    </span>
                </div>
            </div>

            <div class="mt-8 p-4 bg-slate-900 border border-slate-800 rounded-xl text-center">
                <p class="text-[10px] text-slate-600 mb-2">ADVERTISEMENT</p>
                <div class="h-20 bg-slate-800/30 flex items-center justify-center rounded italic text-slate-500 text-xs">
                    Your Secondary Ad Code Here
                </div>
            </div>

            <div class="mt-12">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-red-600 rounded-full"></span>
                    More For You
                </h3>
                <div id="rec-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </main>

    <footer class="mt-20 border-t border-slate-900 p-8 text-center text-slate-600 text-xs">
        <p>&copy; 2026 Kabir Khan Productions. All Rights Reserved.</p>
    </footer>

    <script>
        // Cloudflare Worker URL
        const workerUrl = "https://myproxy.kalamsuperkingsk.workers.dev/";

        async function startApp() {
            const params = new URLSearchParams(window.location.search);
            const videoId = params.get('id');

            try {
                const response = await fetch('video_data.json');
                const data = await response.json();
                const video = data.find(v => v.id == videoId);

                if (video) {
                    document.title = video.title + " | VideoHub";
                    document.getElementById('vTitle').innerText = video.title;
                    document.getElementById('vID').innerText = "VIDEO_ID: " + video.id;
                    document.getElementById('vDur').innerText = "DURATION: " + (video.duration || 'N/A');

                    // Proxying the Embed URL
                    const xmishtiUrl = `https://www.xmishti.com/embed/${video.id}/`;
                    const finalUrl = `${workerUrl}?url=${encodeURIComponent(xmishtiUrl)}`;

                    // Injecting Iframe
                    setTimeout(() => {
                        document.getElementById('playerBox').innerHTML = `
                            <iframe src="${finalUrl}" allowfullscreen scrolling="no"></iframe>
                        `;
                    }, 800);

                    // Recommendations
                    const grid = document.getElementById('rec-grid');
                    data.filter(v => v.id != videoId).sort(() => 0.5 - Math.random()).slice(0, 12).forEach(v => {
                        grid.innerHTML += `
                            <div class="cursor-pointer group" onclick="window.location.href='video.html?id=${v.id}'">
                                <div class="aspect-video bg-slate-900 rounded-lg overflow-hidden mb-2 ring-1 ring-slate-800 group-hover:ring-red-600 transition-all">
                                    <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                                </div>
                                <h4 class="text-[11px] font-medium line-clamp-2 text-slate-400 group-hover:text-white transition-colors">${v.title}</h4>
                            </div>`;
                    });
                }
            } catch (err) {
                console.error("Initialization Failed:", err);
            }
        }
        window.onload = startApp;
    </script>
</body>
</html>
