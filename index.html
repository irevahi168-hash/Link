<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="bg-gray-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-500">Video<span class="text-white">Hub</span></h1>
            <nav class="hidden md:block">
                <ul class="flex space-x-6 text-sm font-medium">
                    <li><a href="index.html" class="hover:text-red-400">Home</a></li>
                    <li><a href="#popular" class="hover:text-red-400">Popular</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="mb-12">
            <h2 class="text-xl font-bold mb-6 border-l-4 border-red-500 pl-3">Latest Updates</h2>
            <div id="latest-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                <p class="text-gray-500 italic">ভিডিও লোড হচ্ছে...</p>
            </div>
        </section>

        <section id="popular" class="mb-12">
            <h2 class="text-xl font-bold mb-6 border-l-4 border-blue-500 pl-3">Popular Videos</h2>
            <div id="popular-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 p-8 text-center text-gray-500 text-sm mt-10">
        <p>&copy; 2026 Developer Kabir Khan</p>
    </footer>

    <script>
        // URL-এর জন্য টাইটেল ক্লিন করা
        function slugify(text) {
            return text.toString().toLowerCase()
                .replace(/\s+/g, '-')
                .replace(/[^\w\-]+/g, '')
                .replace(/\-\-+/g, '-')
                .replace(/^-+/, '')
                .replace(/-+$/, '');
        }

        async function init() {
            try {
                // একটি মাত্র JSON ফাইল লোড
                const response = await fetch('video_data.json');
                const allVideos = await response.json();

                // প্রতিদিন আলাদা সিরিয়াল (Shuffle) করার লজিক
                const todaySeed = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                function shuffle(array, seed) {
                    let m = array.length, t, i;
                    let random = () => {
                        seed = (seed * 9301 + 49297) % 233280;
                        return seed / 233280;
                    };
                    while (m) {
                        i = Math.floor(random() * m--);
                        t = array[m];
                        array[m] = array[i];
                        array[i] = t;
                    }
                    return array;
                }

                const dailyVideos = shuffle([...allVideos], parseInt(todaySeed));
                
                // প্রথম ২০টি লেটেস্ট, পরের ২০টি পপুলার
                render('latest-grid', dailyVideos.slice(0, 20));
                render('popular-grid', dailyVideos.slice(20, 40));

            } catch (e) {
                console.error("Data Load Error:", e);
                document.getElementById('latest-grid').innerHTML = "ভিডিও লোড করা সম্ভব হয়নি।";
            }
        }

        function render(id, items) {
            const grid = document.getElementById(id);
            grid.innerHTML = '';
            items.forEach(v => {
                const slug = slugify(v.title || "video");
                grid.innerHTML += `
                    <div class="video-card bg-gray-800 rounded-lg overflow-hidden cursor-pointer shadow-lg transition-all" 
                         onclick="window.location.href='video.html?v=${slug}&id=${v.id}'">
                        <div class="aspect-video relative overflow-hidden bg-gray-700">
                            <img src="${v.thumb}" class="w-full h-full object-cover transition-all duration-500" loading="lazy">
                            <span class="absolute bottom-1 right-1 bg-black/80 text-[10px] px-1.5 py-0.5 rounded">${v.duration || 'N/A'}</span>
                        </div>
                        <div class="p-3">
                            <h3 class="text-xs md:text-sm font-semibold line-clamp-2">${v.title}</h3>
                        </div>
                    </div>`;
            });
        }
        init();
    </script>
</body>
</html>
