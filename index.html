<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - Premium Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; }
        .video-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(2,6,23,0) 0%, #020617 100%); }
    </style>
</head>
<body class="font-sans">

    <nav class="p-5 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md">
        <div class="text-2xl font-black italic text-white uppercase tracking-tighter">VIDEO<span class="text-red-600">HUB</span></div>
        <div class="relative w-1/3 md:w-1/4">
            <input type="text" id="searchInput" onkeyup="searchVideos()" placeholder="Search movies..." class="w-full bg-slate-900 border border-slate-700 rounded-full py-2 px-4 text-xs focus:outline-none focus:border-red-600 transition-all">
        </div>
    </nav>

    <div class="h-[40vh] relative flex items-end p-8 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&q=80&w=2070');">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10">
            <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter mb-2">Unlimited Entertainment</h1>
            <p class="text-slate-400 text-sm max-w-md">Stream your favorite content directly in high definition with zero interruptions.</p>
        </div>
    </div>

    <main class="container mx-auto px-4 py-12">
        <div id="videoGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <script>
        let allVideos = [];

        async function loadVideos() {
            try {
                const response = await fetch('video_data.json');
                allVideos = await response.json();
                renderVideos(allVideos);
            } catch (err) { console.error("Error loading JSON:", err); }
        }

        function renderVideos(data) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = data.map(v => `
                <div class="video-card group cursor-pointer" onclick="window.location.href='video.html?id=${v.id}'">
                    <div class="aspect-video bg-slate-900 rounded-xl overflow-hidden mb-3 ring-1 ring-slate-800 group-hover:ring-red-600 transition-all shadow-xl">
                        <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-700" loading="lazy">
                    </div>
                    <h3 class="text-xs font-bold uppercase tracking-tight line-clamp-2 text-slate-300 group-hover:text-white">${v.title}</h3>
                </div>
            `).join('');
        }

        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(query));
            renderVideos(filtered);
        }

        window.onload = loadVideos;
    </script>
</body>
</html>
