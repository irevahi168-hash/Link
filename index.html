<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0f16; color: #a0aec0; }
        .video-title-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }
    </style>
</head>
<body class="font-sans">

    <nav class="p-3 border-b border-gray-800 flex justify-between items-center sticky top-0 z-50 bg-[#0c0f16]">
        <div class="text-xl font-extrabold italic text-white uppercase tracking-tight">VIDEO<span class="text-red-600">HUB</span></div>
        <div class="relative w-1/2 md:w-1/4">
            <input type="text" id="searchInput" onkeyup="searchVideos()" placeholder="Search videos..." class="w-full bg-gray-900 border border-gray-700 rounded-md py-1.5 px-3 text-[11px] text-gray-300 focus:outline-none focus:border-red-600">
        </div>
    </nav>

    <main class="container mx-auto px-2 py-6">
        <div id="videoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
            <div id="loader" class="col-span-full text-center py-20 text-xs uppercase tracking-widest animate-pulse">Loading Videos...</div>
        </div>
    </main>

    <script>
        const CDN_BASE = "https://cdn.xmishti.com"; // আপনার ভিডিওর মেইন সার্ভার
        let allVideos = [];

        async function loadVideos() {
            try {
                const response = await fetch('video_data.json');
                allVideos = await response.json();
                
                document.getElementById('loader').remove(); // লোডার রিমুভ করা
                renderVideos(allVideos);
            } catch (err) { 
                console.error("Error loading JSON:", err);
                document.getElementById('loader').innerText = "Failed to load videos.";
            }
        }

        function renderVideos(data) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = data.map(v => {
                // আপনার JSON-এ থাকা direct_url থেকে .mp4 বাদ দিয়ে .jpg করা হচ্ছে থাম্বনেইলের জন্য
                const thumbUrl = CDN_BASE + v.direct_url.replace('.mp4', '.jpg');
                
                return `
                <div class="relative aspect-video bg-gray-900 rounded-md overflow-hidden cursor-pointer group shadow-lg" onclick="window.location.href='video.html?id=${v.id}'">
                    <img src="${thumbUrl}" 
                         alt="${v.title}" 
                         class="w-full h-full object-cover group-hover:scale-105 transition-all duration-300"
                         onerror="this.src='https://via.placeholder.com/320x180/1a1d24/ffffff?text=No+Image'">
                    
                    <div class="absolute inset-0 video-title-overlay flex items-end p-2 opacity-90 group-hover:opacity-100">
                        <h3 class="text-[11px] md:text-[12px] font-medium text-white line-clamp-1 leading-tight">${v.title}</h3>
                    </div>
                </div>
                `;
            }).join('');
        }

        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(query));
            renderVideos(filtered);
        }

        window.onload = loadVideos;
    </script>
</body>
</html>
